# /etc/nginx/sites-available/casa-do-ads.conf
# Troque SEU_DOMINIO.com.br pelo domínio real.

server {
  listen 80;
  listen [::]:80;

  server_name bobia.com.br www.bobia.com.br;

  # logs
  access_log /var/log/nginx/casa-do-ads.access.log;
  error_log  /var/log/nginx/casa-do-ads.error.log;

  # proxy para Node (PM2) em localhost:3000
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }
}
